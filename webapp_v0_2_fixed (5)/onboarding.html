<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem('selfTheme'); if(t==='light') document.documentElement.setAttribute('data-theme','light');})();</script>
  <title>Who are you? — The Ultimate Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <button class="theme-toggle-fixed" id="theme-toggle-btn" onclick="toggleAppTheme()" aria-label="Toggle theme">&#9788;</button>
  <div class="shell anchor-screen" id="loading-state">
    <p class="muted">One moment…</p>
  </div>

  <div class="shell anchor-screen pause" id="question-state" style="display: none;">
    <p class="anchor-question" id="anchor-prompt">Who are you?</p>
    <p class="faint" style="margin-bottom: var(--space-md);">
      There's no right answer. Write whatever comes first — you won't see this again until it matters.
    </p>
    <textarea id="answer" autofocus placeholder="Start writing…"></textarea>
    <div class="error-message" id="error"></div>
    <button class="btn-primary" id="submit-btn" style="margin-top: var(--space-sm);" disabled>
      Begin the journey
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    let anchorMomentId = null;

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      const userId = session.user.id;

      // Find the anchor moment (the "Who are you?" question, is_anchor = true).
      const { data: anchorMoments, error: momentError } = await supabaseClient
        .from('moments')
        .select('id, prompt')
        .eq('is_anchor', true)
        .limit(1)
        .single();

      if (momentError || !anchorMoments) {
        document.getElementById('loading-state').innerHTML =
          '<p class="error-message">Something went wrong loading the first question. Please refresh.</p>';
        return;
      }
      anchorMomentId = anchorMoments.id;
      document.getElementById('anchor-prompt').textContent = anchorMoments.prompt;

      // Has this user already answered the anchor question before?
      // If yes, onboarding is not for them — send straight to Return.
      const { data: existingResponses } = await supabaseClient
        .from('responses')
        .select('id')
        .eq('user_id', userId)
        .eq('moment_id', anchorMomentId)
        .limit(1);

      if (existingResponses && existingResponses.length > 0) {
        window.location.href = 'return.html';
        return;
      }

      // Genuinely Day 1 — show the question.
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('question-state').style.display = 'block';
    })();

    const textarea = document.getElementById('answer');
    const submitBtn = document.getElementById('submit-btn');
    textarea.addEventListener('input', () => {
      submitBtn.disabled = textarea.value.trim().length === 0;
    });

    submitBtn.addEventListener('click', async () => {
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';

      const { data: { session } } = await supabaseClient.auth.getSession();

      const { error } = await supabaseClient.from('responses').insert({
        user_id: session.user.id,
        moment_id: anchorMomentId,
        answer: textarea.value.trim()
      });

      if (error) {
        errorEl.textContent = 'Could not save — please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Begin the journey';
        return;
      }

      window.location.href = 'return.html';
    });
  </script>
  <script src="js/theme.js"></script>
</body>
</html>
