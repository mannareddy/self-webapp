<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>(function(){var t=localStorage.getItem('selfTheme'); if(t==='light') document.documentElement.setAttribute('data-theme','light');})();</script>
  <title>The Return — The Ultimate Journey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <button class="theme-toggle-fixed" id="theme-toggle-btn" onclick="toggleAppTheme()" aria-label="Toggle theme">&#9788;</button>

  <div class="shell anchor-screen" id="loading-state">
    <p class="muted">One moment…</p>
  </div>

  <!-- Shown if they already returned to this today — no re-answering allowed until a new day -->
  <div class="shell anchor-screen" id="already-returned-state" style="display: none;">
    <p class="muted pause" style="font-style: italic;">You already returned to this today.</p>
    <p class="faint" style="margin-top: var(--space-sm);">Come back another day — that's what makes the comparison mean something.</p>
    <div style="margin-top: var(--space-lg);">
      <a href="return.html"><button class="btn-quiet">Back to Return</button></a>
    </div>
  </div>

  <!-- Re-ask the anchor question, zero framing — same question, no hint of what came before -->
  <div class="shell anchor-screen pause" id="question-state" style="display: none;">
    <p class="anchor-question" id="anchor-prompt"></p>
    <textarea id="answer" autofocus placeholder="Start writing…"></textarea>
    <div class="error-message" id="error"></div>
    <button class="btn-primary" id="submit-btn" style="margin-top: var(--space-sm);" disabled>
      Save this
    </button>
  </div>

  <!-- Deliberate pause before the reveal — no text, just a breath -->
  <div class="shell anchor-screen" id="pause-state" style="display: none;">
    <p class="muted pause" style="font-style: italic;">Take a moment.</p>
  </div>

  <!-- The reveal: Day 1 vs. now, side by side -->
  <div class="shell" id="reveal-state" style="display: none;">
    <h2 style="text-align: center;">Then. And now.</h2>
    <div class="return-compare pause">
      <div class="then-now-block then">
        <div class="then-now-label" id="then-date-label">Day 1</div>
        <p class="then-now-answer" id="then-answer"></p>
      </div>
      <div class="then-now-block now">
        <div class="then-now-label">Just now</div>
        <p class="then-now-answer" id="now-answer"></p>
      </div>
    </div>
    <p class="muted" style="font-style: italic; text-align: center; margin-top: var(--space-lg);">
      Not better. Not worse. Just what's true today, next to what was true then.
    </p>
    <div style="text-align: center; margin-top: var(--space-lg);">
      <a href="return.html"><button class="btn-quiet">Back to Return</button></a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    let anchorMomentId = null;
    let firstAnswer = null;
    let firstDate = null;

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      const userId = session.user.id;

      const { data: anchorMoment, error: momentError } = await supabaseClient
        .from('moments')
        .select('id, prompt')
        .eq('is_anchor', true)
        .limit(1)
        .single();

      if (momentError || !anchorMoment) {
        document.getElementById('loading-state').innerHTML =
          '<p class="error-message">Something went wrong loading this. Please refresh.</p>';
        return;
      }
      anchorMomentId = anchorMoment.id;
      document.getElementById('anchor-prompt').textContent = anchorMoment.prompt;

      // Every anchor response ever given, oldest first — the first one is Day 1.
      const { data: pastAnswers } = await supabaseClient
        .from('responses')
        .select('answer, created_at')
        .eq('user_id', userId)
        .eq('moment_id', anchorMomentId)
        .order('created_at', { ascending: true });

      if (!pastAnswers || pastAnswers.length === 0) {
        // Hasn't done Day 1 yet — this screen isn't for them.
        window.location.href = 'onboarding.html';
        return;
      }

      firstAnswer = pastAnswers[0].answer;
      firstDate = new Date(pastAnswers[0].created_at);

      // Gate: if the most recent anchor answer was already given today,
      // don't let them re-answer again in the same sitting. The whole
      // point of this screen is that the comparison means something
      // because real time passed — that's undermined if someone can
      // submit a second "now" answer five minutes after the first.
      const mostRecent = pastAnswers[pastAnswers.length - 1];
      const mostRecentDate = new Date(mostRecent.created_at);
      const isSameCalendarDay = mostRecentDate.toDateString() === new Date().toDateString();

      if (isSameCalendarDay) {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('already-returned-state').style.display = 'block';
        return;
      }

      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('question-state').style.display = 'block';
    })();

    const textarea = document.getElementById('answer');
    const submitBtn = document.getElementById('submit-btn');
    textarea.addEventListener('input', () => {
      submitBtn.disabled = textarea.value.trim().length === 0;
    });

    submitBtn.addEventListener('click', async () => {
      const errorEl = document.getElementById('error');
      errorEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Saving…';

      const { data: { session } } = await supabaseClient.auth.getSession();
      const answerText = textarea.value.trim();

      const { error } = await supabaseClient.from('responses').insert({
        user_id: session.user.id,
        moment_id: anchorMomentId,
        answer: answerText
      });

      if (error) {
        errorEl.textContent = 'Could not save — please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Save this';
        return;
      }

      // Deliberate pause before the reveal — no rushing straight to the comparison.
      document.getElementById('question-state').style.display = 'none';
      document.getElementById('pause-state').style.display = 'block';

      setTimeout(() => {
        const dateLabel = firstDate.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
        document.getElementById('then-date-label').textContent = dateLabel;
        document.getElementById('then-answer').textContent = firstAnswer;
        document.getElementById('now-answer').textContent = answerText;

        document.getElementById('pause-state').style.display = 'none';
        document.getElementById('reveal-state').style.display = 'block';
      }, 1800);
    });
  </script>
  <script src="js/theme.js"></script>
</body>
</html>
